      width: 5px;
    }

    }

      background: #FFD5D0;

    }

    if (typeof __firebase_config !== 'undefined' && __firebase_config) {
      try {
        firebaseConfig = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
        if (firebaseConfig && firebaseConfig.apiKey) {
          isLocalMode = false;
        }
      } catch (e) {
        console.error("Platform Firebase init failed:", e);
      }
    }

    // 2. 만약 플랫폼 주입이 없고(다운로드 파일인 경우), 사용자가 커스텀하게 입력한 설정이 있다면 그것을 사용
    if (isLocalMode) {
      const savedCustomConfig = localStorage.getItem('biblemate_custom_firebase_config');
      if (savedCustomConfig) {
        try {
          firebaseConfig = JSON.parse(savedCustomConfig);
          if (firebaseConfig && firebaseConfig.apiKey) {
            isLocalMode = false;
          }
        } catch (e) {
          console.error("Custom Firebase parsing failed:", e);
        }
      }
    }

      try {
        app = firebase.apps.length === 0 ? firebase.initializeApp(firebaseConfig) : firebase.app();
        auth = firebase.auth();
        db = firebase.firestore();

        console.error("Firebase connection failed. Force-switching to Local mode.", e);

      const [user, setUser] = useState(null);
      const [currentUserProfile, setCurrentUserProfile] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      
      const [groupId, setGroupId] = useState('');
      const [groupName, setGroupName] = useState('우리 말씀 동행방 🌸');
      const [isEditingGroupName, setIsEditingGroupName] = useState(false);
      const [groupNameInput, setGroupNameInput] = useState('');

      // Firebase 인증 오류 방지용 로컬 폴백 트리거
      const [offlineMode, setOfflineMode] = useState(isLocalMode);
      const [authErrorReason, setAuthErrorReason] = useState(''); // 특정 연동 실패 원인 파싱용

      // 실시간 클라우드 / 로컬 통합 데이터
      const [allUsers, setAllUsers] = useState([]);
      const [allLogs, setAllLogs] = useState([]);
      const [allShares, setAllShares] = useState([]);
      const [allChecklists, setAllChecklists] = useState([]);

      const [activeTab, setActiveTab] = useState('tracker'); 
      const [randomVerse, setRandomVerse] = useState(DAILY_VERSES[0]);
      const [showToast, setShowToast] = useState(null);

      const [nicknameInput, setNicknameInput] = useState('');
      const [selectedColorIdx, setSelectedColorIdx] = useState(0);
      const [showProfileModal, setShowProfileModal] = useState(false);

      const [selectedBook, setSelectedBook] = useState('창세기');
      const [shareToFeed, setShareToFeed] = useState(true);

      const [newShareContent, setNewShareContent] = useState('');
      const [newShareRef, setNewShareRef] = useState('');

      // 커스텀 파이어베이스 수동 설정 모달용
      const [showConfigModal, setShowConfigModal] = useState(false);
      const [configInput, setConfigInput] = useState(() => {
        return localStorage.getItem('biblemate_custom_firebase_config') || '';
      });

      // 카톡 수동 코드 공유용 모달/입력
      const [showCodeShareModal, setShowCodeShareModal] = useState(false);
      const [friendCodeInput, setFriendCodeInput] = useState('');

      const triggerToast = (msg) => {
        setShowToast(msg);
        setTimeout(() => {
          setShowToast(null);
        }, 3000);
      };

      // URL Hash 기반 공유방 ID 동기화
      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash;
          let currentGroup = '';
          if (hash && hash.startsWith('#group-')) {
            currentGroup = hash.replace('#group-', '');
          } else {
            currentGroup = 'mate-' + Math.random().toString(36).substring(2, 8);
            window.location.hash = '#group-' + currentGroup;
          }
          setGroupId(currentGroup);
        };
        handleHashChange();
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      // 인증 리스너 (Rule 3)
      useEffect(() => {
        if (offlineMode) {
          setIsAuthLoading(false);
          const randIdx = Math.floor(Math.random() * DAILY_VERSES.length);
          setRandomVerse(DAILY_VERSES[randIdx]);
          return;
        }

        const initAuth = async () => {
          try {
            await auth.signInAnonymously();
          } catch (error) {
            console.error("Auth Error:", error);
            setOfflineMode(true);
            // 구글 콘솔에서 익명 로그인을 안 켰을 때 발생하는 특수 코드 감지

              ];
              localStorage.setItem(localSharesKey, JSON.stringify(sharesList));
            }
            setAllShares(sharesList);

            // 가상 체크리스트 세팅

                { id: "dummy1_" + groupId, userId: "dummy1", groupId, userName: "요한 💡", avatarColorIdx: 1, chapters: { "창세기": [1] } },
                { id: "dummy2_" + groupId, userId: "dummy2", groupId, userName: "마리아 🌸", avatarColorIdx: 4, chapters: { "창세기": [1, 2] } }

        // --- ONLINE FIREBASE MODE (Rule 1 & Rule 2) ---

        const unsubscribeUsers = db.collection(`artifacts/${appId}/public/data/users`).onSnapshot(

        const unsubscribeShares = db.collection(`artifacts/${appId}/public/data/shares`).onSnapshot(

      // 커스텀 파이어베이스 수동 설정 완료 시 작동 기전
      // [초강력 업그레이드] 기종과 특수 공백, 예쁜 따옴표를 모두 가공해 필요한 JSON 필드만 쏙쏙 찾아내는 정밀 정규식 파서 탑재
      const handleSaveCustomConfig = () => {
        try {
          const trimmed = configInput.trim();
          if (!trimmed) {
            localStorage.removeItem('biblemate_custom_firebase_config');
            triggerToast("설정이 비워졌습니다. 이제 로컬 연습 모드로 새로고침됩니다.");
            setShowConfigModal(false);
            setTimeout(() => {
              window.location.reload();
            }, 1000);
            return;
          }

          // 1단계: 모바일/메신저 복사 시 생기는 숨겨진 특수 공백들(\u00a0, NBSP 등)을 표준 공백으로 정화
          // 2단계: 스마트 장치에서 교묘하게 꼬여 들어오는 예쁜 큰따옴표/작은따옴표(“ ”, ‘ ’)를 표준 따옴표로 통일
          const cleanInput = trimmed
            .replace(/[\u00a0\u1680\u180e\u2000-\u200a\u2028\u2029\u202f\u205f\u3000]/g, ' ')
            .replace(/[“]/g, '"')
            .replace(/[”]/g, '"')
            .replace(/[‘]/g, "'")
            .replace(/[’]/g, "'");

          // 3단계: 정교한 정규식을 사용하여 JS 오브젝트 문법이든 JSON 문법이든 필드값을 확실하게 채굴
          const extractField = (str, key) => {
            const regex = new RegExp(`['"]?${key}['"]?\\s*:\\s*['"]([^'"]+)['"]`);
            const match = str.match(regex);
            return match ? match[1].trim() : null;
          };

          const apiKeyVal = extractField(cleanInput, 'apiKey');
          const authDomainVal = extractField(cleanInput, 'authDomain');
          const projectIdVal = extractField(cleanInput, 'projectId');
          const storageBucketVal = extractField(cleanInput, 'storageBucket');
          const messagingSenderIdVal = extractField(cleanInput, 'messagingSenderId');
          const appIdVal = extractField(cleanInput, 'appId');

          // 핵심 정보 자가 진단
          if (!apiKeyVal || !projectIdVal) {
            triggerToast("설정 코드에서 apiKey 또는 projectId를 찾지 못했습니다. 전체 복사 후 다시 붙여넣어 주세요!");
            return;
          }

          // 완벽한 구조의 JSON으로 최종 수렴 및 직렬화
          const parsedConfig = {
            apiKey: apiKeyVal,
            authDomain: authDomainVal || `${projectIdVal}.firebaseapp.com`,
            projectId: projectIdVal,
            storageBucket: storageBucketVal || `${projectIdVal}.firebasestorage.app`,
            messagingSenderId: messagingSenderIdVal || '',
            appId: appIdVal || ''
          };

          localStorage.setItem('biblemate_custom_firebase_config', JSON.stringify(parsedConfig));
          triggerToast("파이어베이스 클라우드가 연결되었습니다! 1초 뒤 자동 새로고침됩니다. ✨");
          setShowConfigModal(false);
          setTimeout(() => {
            window.location.reload();
          }, 1000);
        } catch (e) {
          console.error("Config Parsing Error:", e);
          triggerToast("설정 정보를 해석하는 중에 에러가 발생했습니다. 파이어베이스 콘솔 화면의 코드를 그대로 전체 복사해 주세요.");
        }
      };

      // 설정 초기화 핸들러
      const handleResetCustomConfig = () => {
        localStorage.removeItem('biblemate_custom_firebase_config');
        setConfigInput('');
        triggerToast("연동 설정이 초기화되었습니다. 로컬 모드로 전환하기 위해 새로고침합니다.");
        setShowConfigModal(false);
        setTimeout(() => {
          window.location.reload();
        }, 1000);
      };

      const handleCopyInviteLink = () => {
        const inviteUrl = `${window.location.origin}${window.location.pathname}#group-${groupId}`;
        const textArea = document.createElement("textarea");
        textArea.value = inviteUrl;
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        
        try {
          document.execCommand('copy');
          triggerToast("초대 링크가 복사되었습니다! 친구에게 보내어 함께해요 📬");
        } catch (err) {

        }

      };

      const handleSaveGroupName = async () => {
        if (!groupId) return;
        const trimmed = groupNameInput.trim();
        if (!trimmed) return;

        if (offlineMode) {
          setGroupName(trimmed);

      const handleSaveProfile = async () => {

        const tempUserId = offlineMode

        }

      const handleToggleChapter = async (bookName, chapterNum) => {
        if (!currentUserProfile && offlineMode) {
          setShowProfileModal(true);
          return;
        }
        if (!user && !offlineMode) {
          setShowProfileModal(true);
          return;
        }

        const tempUserId = offlineMode ? currentUserProfile.userId : user.uid;
        const checklistKey = `${tempUserId}_${groupId}`;

        if (offlineMode) {
          const localChecklistsKey = `biblemate_${appId}_checklists`;
          const localLogsKey = `biblemate_${appId}_logs`;
          const localSharesKey = `biblemate_${appId}_shares`;

          let checklistsList = JSON.parse(localStorage.getItem(localChecklistsKey)) || [];
          let myChk = checklistsList.find(c => c.id === checklistKey);
          
          if (!myChk) {
            myChk = { id: checklistKey, userId: tempUserId, groupId, userName: currentUserProfile.nickname, avatarColorIdx: currentUserProfile.avatarColorIdx, chapters: {} };
            checklistsList.push(myChk);
          }

          const currentChapters = myChk.chapters || {};
          const bookChapters = currentChapters[bookName] || [];
          let updatedChapters = [];
          let isCheckedOn = false;

          if (bookChapters.includes(chapterNum)) {
            updatedChapters = bookChapters.filter(c => c !== chapterNum);
            isCheckedOn = false;
          } else {
            updatedChapters = [...bookChapters, chapterNum];
            isCheckedOn = true;
          }

          myChk.chapters = { ...currentChapters, [bookName]: updatedChapters };
          localStorage.setItem(localChecklistsKey, JSON.stringify(checklistsList));
          setAllChecklists(checklistsList);

          if (isCheckedOn) {
            let logsList = JSON.parse(localStorage.getItem(localLogsKey)) || [];
            const newLog = {
              id: "log_" + Date.now() + "_" + Math.random().toString(36).substr(2, 4),
              userId: tempUserId,
              userName: currentUserProfile.nickname,
              avatarColorIdx: currentUserProfile.avatarColorIdx,
              book: bookName,
              chapter: chapterNum,
              groupId: groupId,
              timestamp: Date.now()
            };
            logsList.push(newLog);
            localStorage.setItem(localLogsKey, JSON.stringify(logsList));
            setAllLogs(logsList);

            if (shareToFeed) {

              const newShare = {

                userId: tempUserId,
                userName: currentUserProfile.nickname,

              };

              localStorage.setItem(localSharesKey, JSON.stringify(sharesList));

        const myChecklistDoc = allChecklists.find(chk => chk.id === checklistKey);
        const currentChapters = myChecklistDoc?.chapters || {};

          const newLog = {

          };
          logsList.push(newLog);
          localStorage.setItem(localLogsKey, JSON.stringify(logsList));
          setAllLogs(logsList);

          triggerToast(value ? `🎉 ${bookName}의 모든 장을 스티커로 채웠어요!` : `✨ ${bookName}을 다시 비워두었습니다.`);
          return;
        }

        const myChecklistDoc = allChecklists.find(chk => chk.id === checklistKey);
        const currentChapters = myChecklistDoc?.chapters || {};

        let updatedChapters = [];
        if (value) {
          updatedChapters = Array.from({ length: totalChapters }, (_, i) => i + 1);
        }

        const newChapters = { ...currentChapters, [bookName]: updatedChapters };

        try {
          const checklistRef = db.doc(`artifacts/${appId}/public/data/checklists/${checklistKey}`);
          await checklistRef.set({

            userName: currentUserProfile.nickname,
            avatarColorIdx: currentUserProfile.avatarColorIdx || 0,
            chapters: newChapters,
            updatedAt: Date.now()
          }, { merge: true });

          await db.collection(`artifacts/${appId}/public/data/readingLogs`).add({
            userId: user.uid,
            userName: currentUserProfile.nickname,
            avatarColorIdx: currentUserProfile.avatarColorIdx || 0,
            book: bookName,
            chapter: value ? `1~${totalChapters}` : '초기화',
            groupId: groupId,
            timestamp: Date.now()
          });

          triggerToast(value ? `🎉 ${bookName} 전부 읽음 처리 완료!` : `✨ ${bookName} 비우기 완료.`);
        } catch (err) {
          console.error(err);
        }
      };

      const handlePostShare = async (e) => {
        e.preventDefault();
        if (!currentUserProfile) {
          triggerToast("프로필을 완료해 주세요.");
          return;
        }

        if (!newShareContent.trim()) {
          triggerToast("나눌 내용을 작성해 주세요.");
          return;
        }

        if (offlineMode) {
          const tempUserId = currentUserProfile.userId;
          const localSharesKey = `biblemate_${appId}_shares`;

          let sharesList = JSON.parse(localStorage.getItem(localSharesKey)) || [];
          const newShare = {
            id: "share_" + Date.now(),
            userId: tempUserId,
            userName: currentUserProfile.nickname,
            avatarColorIdx: currentUserProfile.avatarColorIdx,
            content: newShareContent,
            reference: newShareRef.trim() || null,
            groupId: groupId,
            timestamp: Date.now(),
            likes: []
          };
          sharesList.push(newShare);
          localStorage.setItem(localSharesKey, JSON.stringify(sharesList));
          setAllShares(sharesList);

          setNewShareContent('');
          setNewShareRef('');
          triggerToast("묵상이 등록되었습니다! 💌");
          return;
        }

        try {
          await db.collection(`artifacts/${appId}/public/data/shares`).add({
            userId: user.uid,
            userName: currentUserProfile.nickname,
            avatarColorIdx: currentUserProfile.avatarColorIdx || 0,
            content: newShareContent,
            reference: newShareRef.trim() || null,
            groupId: groupId,
            timestamp: Date.now(),
            likes: []
          });

          setNewShareContent('');
          setNewShareRef('');
          triggerToast("묵상이 등록되었습니다! 💌");
        } catch (err) {
          console.error(err);
        }
      };

      const handleDeleteShare = async (shareId) => {
        if (offlineMode) {
          const localSharesKey = `biblemate_${appId}_shares`;
          let sharesList = JSON.parse(localStorage.getItem(localSharesKey)) || [];
          sharesList = sharesList.filter(s => s.id !== shareId);
          localStorage.setItem(localSharesKey, JSON.stringify(sharesList));
          setAllShares(sharesList);
          triggerToast("게시된 묵상을 삭제했습니다.");
          return;
        }

        try {
          await db.doc(`artifacts/${appId}/public/data/shares/${shareId}`).delete();
          triggerToast("나눔을 정돈했습니다.");
        } catch (err) {
          console.error(err);
        }
      };

      const handleToggleLike = async (shareId, currentLikes = []) => {
        const tempUserId = offlineMode ? (currentUserProfile?.userId || 'local_user') : user.uid;

        if (offlineMode) {
          const localSharesKey = `biblemate_${appId}_shares`;
          let sharesList = JSON.parse(localStorage.getItem(localSharesKey)) || [];
          const shareIndex = sharesList.findIndex(s => s.id === shareId);
          if (shareIndex !== -1) {
            let likes = sharesList[shareIndex].likes || [];
            if (likes.includes(tempUserId)) {
              likes = likes.filter(id => id !== tempUserId);
            } else {
              likes.push(tempUserId);
            }
            sharesList[shareIndex].likes = likes;
            localStorage.setItem(localSharesKey, JSON.stringify(sharesList));
            setAllShares(sharesList);
          }
          return;
        }

        const shareDocRef = db.doc(`artifacts/${appId}/public/data/shares/${shareId}`);
        
        try {
          if (currentLikes.includes(tempUserId)) {
            await shareDocRef.update({
              likes: firebase.firestore.FieldValue.arrayRemove(tempUserId)
            });
          } else {
            await shareDocRef.update({
              likes: firebase.firestore.FieldValue.arrayUnion(tempUserId)
            });
          }
        } catch (err) {
          console.error(err);
        }
      };

      // --- 🌸 카톡 수동 진도 공유 작동 기전 ---
      const handleExportMyCode = () => {
        if (!currentUserProfile) {
          triggerToast("이름 설정을 먼저 완료해 주세요!");
          return;
        }
        const tempUserId = offlineMode ? currentUserProfile.userId : user.uid;
        const myChecklist = allChecklists.find(chk => chk.userId === tempUserId);
        const myChapters = myChecklist?.chapters || {};

        const shareData = {
          nickname: currentUserProfile.nickname,
          avatarColorIdx: currentUserProfile.avatarColorIdx,
          chapters: myChapters,
          userId: tempUserId,
          timestamp: Date.now()
        };

        const serialized = btoa(encodeURIComponent(JSON.stringify(shareData)));
        const finalMessage = `[말씀동행 진도표]\n보낸이: ${currentUserProfile.nickname} 🌸\n\n친구 카톡 메시지를 통째로 복사해서 [친구 진도 붙여넣기]에 넣으시면 연동 완료!\n\n👇 복사할 코드:\nBMB-${serialized}-BMB`;

        const textArea = document.createElement("textarea");
        textArea.value = finalMessage;
        textArea.style.position = "fixed";
        textArea.style.top = "0";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          triggerToast("카톡 공유 메시지가 자동 복사되었습니다! 💌");
        } catch (err) {
          triggerToast("복사에 실패했습니다.");
        }
        document.body.removeChild(textArea);
      };

      const handleImportFriendCode = () => {
        const trimmed = friendCodeInput.trim();
        if (!trimmed) {
          triggerToast("카톡 메시지를 붙여넣어 주세요.");
          return;
        }

        const match = trimmed.match(/BMB-(.*?)-BMB/);
        if (!match || !match[1]) {
          triggerToast("올바른 진도 코드가 아닙니다.");
          return;
        }

        try {
          const decrypted = JSON.parse(decodeURIComponent(atob(match[1])));
          const friendUserId = decrypted.userId;
          const friendKey = `${friendUserId}_${groupId}`;

          const localUsersKey = `biblemate_${appId}_users`;
          let usersList = JSON.parse(localStorage.getItem(localUsersKey)) || [];
          usersList = usersList.filter(u => u.userId !== friendUserId);
          usersList.push({
            id: friendKey,
            userId: friendUserId,
            groupId,
            nickname: decrypted.nickname,
            avatarColorIdx: decrypted.avatarColorIdx
          });
          localStorage.setItem(localUsersKey, JSON.stringify(usersList));
          setAllUsers(usersList);

          const localChecklistsKey = `biblemate_${appId}_checklists`;
          let checklistsList = JSON.parse(localStorage.getItem(localChecklistsKey)) || [];
          checklistsList = checklistsList.filter(c => c.id !== friendKey);
          checklistsList.push({
            id: friendKey,
            userId: friendUserId,
            groupId,
            userName: decrypted.nickname,
            avatarColorIdx: decrypted.avatarColorIdx,
            chapters: decrypted.chapters
          });
          localStorage.setItem(localChecklistsKey, JSON.stringify(checklistsList));
          setAllChecklists(checklistsList);

          const localLogsKey = `biblemate_${appId}_logs`;
          let logsList = JSON.parse(localStorage.getItem(localLogsKey)) || [];
          logsList.push({
            id: "log_" + Date.now(),
            userId: friendUserId,
            userName: decrypted.nickname,
            avatarColorIdx: decrypted.avatarColorIdx,
            book: "동기화",
            chapter: "카톡연동",
            groupId,
            timestamp: Date.now()
          });
          localStorage.setItem(localLogsKey, JSON.stringify(logsList));
          setAllLogs(logsList);

          setFriendCodeInput('');
          setShowCodeShareModal(false);
          triggerToast(`🎉 친구 '${decrypted.nickname}'님의 진도 연동에 성공했습니다!`);
        } catch (e) {
          triggerToast("진도 코드 해석 오류가 발생했습니다.");
        }
      };

      // 쿼리 매핑
      const currentUserId = offlineMode 
        ? (currentUserProfile ? currentUserProfile.userId : 'local_user')
        : (user ? user.uid : null);

      const activeUsers = allUsers.filter(u => u.groupId === groupId);
      const activeLogs = allLogs.filter(log => log.groupId === groupId);
      const activeShares = allShares.filter(share => share.groupId === groupId);
      const activeChecklists = allChecklists.filter(chk => chk.groupId === groupId);

      const sortedShares = [...activeShares].sort((a, b) => b.timestamp - a.timestamp);
      const sortedLogs = [...activeLogs].sort((a, b) => b.timestamp - a.timestamp);

      const myChecklistData = activeChecklists.find(chk => chk.userId === currentUserId);
      const myReadMap = myChecklistData?.chapters || {};

      const friendsProgress = activeUsers.map(u => {
        const friendChecklist = activeChecklists.find(chk => chk.userId === u.userId);
        const chaptersMap = friendChecklist?.chapters || {};
        
        let totalChapters = 0;
        Object.keys(chaptersMap).forEach(book => {
          totalChapters += (chaptersMap[book] || []).length;
        });

        const userLogs = activeLogs.filter(log => log.userId === u.userId);
        const lastLog = userLogs.length > 0
          ? [...userLogs].sort((a, b) => b.timestamp - a.timestamp)[0]
          : null;

        return {
          ...u,
          totalChapters,
          lastLog
        };
      }).sort((a, b) => b.totalChapters - a.totalChapters);

      const groupTotalChapters = friendsProgress.reduce((sum, friend) => sum + (friend.totalChapters || 0), 0);
      const readingGoal = 1189; 
      const progressPercent = Math.min(Math.round((groupTotalChapters / readingGoal) * 100), 100);

      const currentBookObj = BIBLE_BOOKS.find(b => b.name === selectedBook) || BIBLE_BOOKS[0];
      const totalChaptersOfSelected = currentBookObj.chapters;
      const myReadInSelectedBook = myReadMap[selectedBook] || [];

      const handleRefreshVerse = () => {
        const currentIdx = DAILY_VERSES.findIndex(v => v.text === randomVerse.text);
        let nextIdx = Math.floor(Math.random() * DAILY_VERSES.length);
        while (nextIdx === currentIdx && DAILY_VERSES.length > 1) {
          nextIdx = Math.floor(Math.random() * DAILY_VERSES.length);
        }
        setRandomVerse(DAILY_VERSES[nextIdx]);
      };

      return (
        <div className="min-h-screen bg-[#FFFDFB] text-slate-800 font-sans antialiased flex flex-col max-w-lg mx-auto shadow-2xl relative border-x border-rose-100/30 animate-fadeIn">
          
          {/* 상단 하이브리드 서버 동기화 인디케이터 바 */}
          <div className={`text-center py-2.5 px-4 text-[10px] font-bold flex items-center justify-between gap-1.5 animate-fadeIn shrink-0 transition-colors ${
            offlineMode 
              ? 'bg-[#FFF3F0] border-b border-rose-100/40 text-[#D35D50]' 
              : 'bg-[#F2FCF6] border-b border-emerald-100/40 text-emerald-700'
          }`}>
            <div className="flex items-center gap-1.5">
              <span className="relative flex h-2 w-2">
                <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-60 ${offlineMode ? 'bg-rose-400' : 'bg-emerald-400'}`}></span>
                <span className={`relative inline-flex rounded-full h-2 w-2 ${offlineMode ? 'bg-[#D35D50]' : 'bg-emerald-500'}`}></span>
              </span>
              <span className="font-title flex items-center gap-1.5">
                {offlineMode 
                  ? "⚠️ 나홀로 로컬 모드 | 친구와 함께 읽으려면?" 
                  : "🟢 실시간 클라우드 가동 중 (초대 친구들과 실시간 연동!)"}
                {offlineMode && (
                  <button 
                    onClick={() => setShowConfigModal(true)} 
                    className="bg-[#D35D50] text-white px-2 py-0.5 rounded hover:bg-[#b04a3e] transition text-[9px] font-bold shrink-0 font-title"
                  >
                    연동 설정 ⚙️
                  </button>
                )}
              </span>
            </div>
            
            {/* 카톡 수동 코드 공유 버튼 */}
            <button 
              onClick={() => setShowCodeShareModal(true)} 
              className="bg-[#D35D50] hover:bg-[#b04a3e] text-white text-[10px] font-black px-3 py-1 rounded-full transition shadow-sm font-title flex items-center gap-1"
            >
              <span>카톡 진도 연동 💬</span>
            </button>
          </div>

          {/* ⚠️ 익명 로그인 꺼져있을 때의 친절 가이드 배너 카드 */}
          {offlineMode && authErrorReason === 'anonymous-disabled' && (
            <div className="bg-amber-50 border-b border-amber-200 p-4.5 text-xs text-amber-900 animate-fadeIn space-y-2.5 shrink-0">
              <div className="flex items-start gap-2">
                <span className="text-base">💡</span>
                <div className="space-y-1">
                  <p className="font-extrabold text-amber-950 font-title">서버 연결 성공을 위한 마지막 1단계!</p>
                  <p className="text-[11px] leading-relaxed text-amber-800">
                    현재 구글 파이어베이스 설정은 성공했지만, 프로젝트의 <strong>'익명 로그인'</strong> 기능이 꺼져있어 로컬 모드로 작동하고 있습니다. 아래 순서대로 켜주시면 즉시 진짜 실시간 공유방이 개설됩니다!
                  </p>
                </div>
              </div>
              <div className="bg-white/80 p-3 rounded-2xl border border-amber-200/40 text-[11px] space-y-1 text-amber-900 font-medium font-sans">
                <p>1. <a href="https://console.firebase.google.com" target="_blank" className="underline font-bold text-amber-950">구글 파이어베이스 콘솔(클릭)</a>에 접속해 프로젝트를 누릅니다.</p>
                <p>2. 왼쪽 메뉴에서 <strong>[Build(빌드)] ➔ [Authentication]</strong>을 클릭합니다.</p>
                <p>3. <strong>[Sign-in method(로그인 제공업체)]</strong> 탭을 누릅니다.</p>
                <p>4. 아래쪽 <strong>[익명 (Anonymous)]</strong>을 찾아 연필 아이콘을 누르고 <strong>[사용 설정 스위치]</strong>를 켠 뒤 <strong>[저장]</strong>을 누르세요!</p>
              </div>
              <p className="text-[10px] text-amber-600 font-bold text-center">※ 위 가이드를 완료하신 뒤 앱을 새로고침(또는 더블클릭 실행) 하시면 완료됩니다!</p>
            </div>
          )}

          {/* --- Top App Header --- */}
          <header className="bg-white/95 backdrop-blur-md border-b border-rose-100/60 px-6 py-4 sticky top-0 z-20 space-y-3 shadow-sm shrink-0">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2.5">
                <div className="bg-[#E88B88] text-white p-2.5 rounded-2xl shadow-sm shadow-rose-200">
                  <Icon name="BookHeart" className="w-4 h-4 animate-pulse" />
                </div>
                <div>
                  {isEditingGroupName ? (
                    <div className="flex items-center gap-1.5 mt-0.5">
                      <input
                        type="text"
                        value={groupNameInput}
                        onChange={(e) => setGroupNameInput(e.target.value)}
                        className="border border-rose-200 rounded-xl px-2.5 py-1 text-xs font-semibold text-slate-800 focus:outline-none focus:ring-2 focus:ring-[#E88B88]"
                        maxLength={20}
                      />
                      <button 
                        onClick={handleSaveGroupName} 
                        className="bg-[#E88B88] hover:bg-[#D47976] text-white px-2.5 py-1 rounded-lg text-[10px] font-bold"
                      >
                        완료
                      </button>
                    </div>
                  ) : (
                    <h1 className="text-sm font-bold text-slate-900 tracking-tight flex items-center gap-1.5 font-title">
                      {groupName}
                      <button onClick={() => setIsEditingGroupName(true)} className="text-[#E88B88] hover:text-[#D47976] transition p-0.5 rounded-lg hover:bg-rose-50">
                        <Icon name="Edit2" className="w-3 h-3" />
                      </button>
                    </h1>
                  )}
                  <p className="text-[10px] text-rose-400 font-mono tracking-wider mt-0.5">ROOM: {groupId}</p>
                </div>
              </div>

              <div>
                <button
                  onClick={handleCopyInviteLink}
                  className="flex items-center gap-1.5 bg-[#FFF0EF] text-[#D35D50] hover:bg-[#FFE0DD] border border-[#FFCCD4] py-1.5 px-3.5 rounded-full text-xs font-semibold transition shadow-none font-title"
                >
                  <Icon name="Share2" className="w-3 h-3" />
                  <span>방 공유</span>
                </button>
              </div>
            </div>

            {/* 내 정보 위젯 */}
            <div className="flex items-center justify-between bg-[#FCF8F5] border border-rose-100/50 rounded-2xl px-4 py-2.5 text-xs">
              <div className="flex items-center gap-2">
                <span className="relative flex h-2 w-2">
                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-60"></span>
                  <span className="relative inline-flex rounded-full h-2 w-2 bg-rose-400"></span>
                </span>
                <span className="text-slate-500 font-medium font-title">동행 멤버 <span className="text-slate-800 font-bold">{activeUsers.length}명</span></span>
              </div>

              {currentUserProfile ? (
                <button 
                  onClick={() => {
                    setNicknameInput(currentUserProfile.nickname);
                    setSelectedColorIdx(currentUserProfile.avatarColorIdx || 0);
                    setShowProfileModal(true);
                  }}
                  className="flex items-center gap-1.5 text-slate-700 hover:text-slate-900 font-medium"
                >
                  <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[9px] font-bold border ${AVATAR_COLORS[currentUserProfile.avatarColorIdx || 0].class}`}>
                    {currentUserProfile.nickname ? currentUserProfile.nickname[0] : '나'}
                  </div>
                  <span className="font-semibold">{currentUserProfile.nickname}</span>
                  <Icon name="Settings" className="w-3 h-3 text-rose-300" />
                </button>
              ) : (
                <button 
                  onClick={() => setShowProfileModal(true)}
                  className="text-[10px] text-[#D35D50] font-bold hover:underline font-title"
                >
                  이름 정하기 ✏️
                </button>
              )}
            </div>
          </header>

          {/* --- Main Content --- */}
          <main className="flex-1 p-5 pb-24 space-y-6 overflow-y-auto">

            {/* 오늘의 말씀 */}
            <div className="bg-gradient-to-tr from-[#FFF2F0] to-[#FFF9F5] rounded-3xl p-5 border border-rose-100/60 relative overflow-hidden">
              <div className="flex justify-between items-center mb-3">
                <span className="text-[10px] font-black text-[#D35D50] tracking-widest uppercase flex items-center gap-1 font-title">
                  <Icon name="Sparkles" className="w-3 h-3 text-[#E88B88]" /> 오늘의 말씀 묵상
                </span>
                <button 
                  onClick={handleRefreshVerse}
                  className="text-[9px] text-[#D35D50] bg-white hover:bg-rose-50 border border-rose-200 px-2.5 py-0.5 rounded-full transition font-title"
                >
                  새 말씀 ↻
                </button>
              </div>
              <p className="text-slate-800 font-medium text-xs leading-relaxed mb-2.5 tracking-tight">
                "{randomVerse.text}"
              </p>
              <p className="text-[10px] font-bold text-[#E88B88] text-right font-title">
                — {randomVerse.ref}
              </p>
            </div>

            {/* 완독 게이지 */}
            <div className="bg-white rounded-3xl p-5 border border-rose-50/50 shadow-sm space-y-3">
              <div className="flex justify-between items-center">
                <div>
                  <h3 className="text-[10px] font-bold text-rose-400 tracking-widest font-title">BIBLE TRAIL PROGRESS</h3>
                  <p className="text-xs text-slate-600 mt-0.5">우리들의 말씀 진도가 <span className="text-[#D35D50] font-extrabold">{groupTotalChapters}장</span>에 도달했습니다!</p>
                </div>
                <div className="text-right">
                  <span className="text-sm font-black text-[#D35D50] font-title">{progressPercent}%</span>
                  <span className="text-[9px] text-slate-400 block font-bold">목표 1189장</span>
                </div>
              </div>
              <div className="w-full bg-rose-50 rounded-full h-2.5 overflow-hidden border border-rose-100/20">
                <div 
                  className="bg-gradient-to-r from-rose-300 to-[#E88B88] h-full rounded-full transition-all duration-1000 ease-out" 
                  style={{ width: `${progressPercent}%` }}
                />
              </div>
            </div>

            {/* 탭 선택바 */}
            <div className="flex bg-[#FFF5F2] p-1.5 rounded-2xl border border-rose-100/30">
              <button
                onClick={() => setActiveTab('tracker')}
                className={`flex-1 flex items-center justify-center gap-1.5 py-2.5 text-xs font-bold rounded-xl transition font-title ${
                  activeTab === 'tracker' 
                    ? 'bg-white text-[#D35D50] shadow-sm font-black' 
                    : 'text-slate-400 hover:text-slate-700'
                }`}
              >
                <Icon name="CheckCircle2" className="w-3 h-3" />
                스티커 체크
              </button>
              <button
                onClick={() => setActiveTab('shares')}
                className={`flex-1 flex items-center justify-center gap-1.5 py-2.5 text-xs font-bold rounded-xl transition font-title ${
                  activeTab === 'shares' 
                    ? 'bg-white text-[#D35D50] shadow-sm font-black' 
                    : 'text-slate-400 hover:text-slate-700'
                }`}
              >
                <Icon name="MessageCircleHeart" className="w-3 h-3" />
                은혜 나눔
              </button>
              <button
                onClick={() => setActiveTab('friends')}
                className={`flex-1 flex items-center justify-center gap-1.5 py-2.5 text-xs font-bold rounded-xl transition font-title ${
                  activeTab === 'friends' 
                    ? 'bg-white text-[#D35D50] shadow-sm font-black' 
                    : 'text-slate-400 hover:text-slate-700'
                }`}
              >
                <Icon name="Users" className="w-3 h-3" />
                동역자들
              </button>
            </div>

            {/* --- TAB 1: 스티커 체크보드 --- */}
            {activeTab === 'tracker' && (
              <div className="space-y-5 font-title">
                
                <div className="bg-white rounded-3xl p-5 border border-rose-100/30 shadow-sm space-y-4">
                  <div className="flex items-center justify-between gap-3 pb-3 border-b border-rose-50">
                    <div className="flex items-center gap-1.5">
                      <Icon name="BookOpen" className="text-[#E88B88] w-4 h-4" />
                      <span className="text-xs font-bold text-slate-800 font-title">성경 탐색</span>
                    </div>
                    
                    <div className="relative">
                      <select
                        value={selectedBook}
                        onChange={(e) => setSelectedBook(e.target.value)}
                        className="bg-[#FFFDFB] border border-rose-100/80 rounded-xl pl-3 pr-8 py-1.5 text-xs font-bold text-slate-700 appearance-none focus:outline-none focus:ring-2 focus:ring-[#E88B88]"
                      >
                        {BIBLE_BOOKS.map((b) => (
                          <option key={b.name} value={b.name}>
                            [{b.type}] {b.name} ({b.chapters}장)
                          </option>
                        ))}
                      </select>
                      <div className="absolute inset-y-0 right-2.5 flex items-center pointer-events-none text-rose-400">
                        <Icon name="ChevronDown" className="w-3 h-3" />
                      </div>
                    </div>
                  </div>

                  {/* 일괄 완료 및 초기화 */}
                  <div className="flex items-center justify-between text-[11px] bg-[#FFFBF9] p-3 rounded-2xl border border-rose-100/30">
                    <div>
                      <span className="font-extrabold text-[#D35D50] font-title">{selectedBook} </span>
                      <span className="text-slate-400 font-medium">나의 동독:</span>{' '}
                      <span className="font-bold text-slate-800">{myReadInSelectedBook.length} / {totalChaptersOfSelected}장</span>
                    </div>
                    <div className="flex gap-1.5">
                      <button
                        type="button"
                        onClick={() => handleSetAllChapters(selectedBook, totalChaptersOfSelected, true)}
                        className="bg-[#FFE8E5] text-[#D35D50] hover:bg-[#FFD2CC] font-bold px-2.5 py-1 rounded-lg transition text-[10px]"
                      >
                        전부완료
                      </button>
                      <button
                        type="button"
                        onClick={() => handleSetAllChapters(selectedBook, totalChaptersOfSelected, false)}
                        className="bg-slate-100 text-slate-400 hover:bg-slate-200 font-bold px-2.5 py-1 rounded-lg transition text-[10px]"
                      >
                        비우기
                      </button>
                    </div>
                  </div>

                  {/* 피드 옵션 */}
                  <div className="flex items-center justify-between text-[10px] text-slate-400 px-1 font-medium">
                    <label className="flex items-center gap-1.5 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={shareToFeed}
                        onChange={(e) => setShareToFeed(e.target.checked)}
                        className="rounded text-[#E88B88] focus:ring-[#E88B88] w-3.5 h-3.5"
                      />
                      <span className="font-semibold text-slate-500">체크할 때마다 은혜나눔에도 소식 알리기</span>
                    </label>
                  </div>

                  {/* 격자형 스티커 체크보드 */}
                  <div className="bg-[#FCF8F5] p-3.5 rounded-2xl border border-rose-100/30">
                    <div className="grid grid-cols-7 sm:grid-cols-8 gap-1.5">
                      {Array.from({ length: totalChaptersOfSelected }, (_, i) => i + 1).map((chapterNum) => {
                        const isMyChapterRead = myReadInSelectedBook.includes(chapterNum);
                        
                        const readersOfThisChapter = activeChecklists.filter(chk => {
                          const chapArr = chk.chapters?.[selectedBook] || [];
                          return chapArr.includes(chapterNum);
                        });

                        return (
                          <button
                            key={chapterNum}
                            type="button"
                            onClick={() => handleToggleChapter(selectedBook, chapterNum)}
                            className={`relative rounded-xl flex flex-col items-center justify-center p-1.5 w-full aspect-square border sticker-btn ${
                              isMyChapterRead 
                                ? 'bg-[#E88B88] text-white border-[#E88B88] shadow-sm shadow-rose-200/50 font-bold font-title' 
                                : 'bg-white text-slate-500 border-slate-200/60 hover:border-rose-300 font-semibold'
                            }`}
                          >
                            <span className="text-[11px] font-mono leading-none">{chapterNum}</span>

                            {readersOfThisChapter.length > 0 && (
                              <div className="absolute bottom-1 flex gap-0.5 justify-center max-w-full">
                                {readersOfThisChapter.slice(0, 3).map((chkUser) => {
                                  const isMeInCheck = currentUserId && chkUser.userId === currentUserId;
                                  const avatarColor = AVATAR_COLORS[chkUser.avatarColorIdx || 0];

                                  return (
                                    <span
                                      key={chkUser.id}
                                      title={chkUser.userName}
                                      className={`w-1.5 h-1.5 rounded-full shrink-0 block ${
                                        isMeInCheck ? 'bg-white border-[0.5px] border-[#D35D50]' : avatarColor.class
                                      }`}
                                    />
                                  );
                                })}
                              </div>
                            )}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>

                {/* 최근 읽기 활동 스트림 */}
                <div className="space-y-3">
                  <h4 className="text-[10px] font-bold text-rose-400 tracking-widest flex items-center gap-1.5 font-title">
                    <Icon name="Flame" className="text-rose-400 animate-bounce" /> RECENT STREAM
                  </h4>

                  {sortedLogs.length === 0 ? (
                    <div className="bg-white rounded-2xl p-8 text-center border border-rose-50 text-slate-400">
                      <p className="text-xs font-semibold">아직 아무 발자국도 찍히지 않았어요!</p>
                      <p className="text-[10px] mt-0.5">첫 스티커를 부착해서 선두 주자가 되어보세요!</p>
                    </div>
                  ) : (
                    <div className="space-y-1.5">
                      {sortedLogs.slice(0, 6).map((log) => {
                        const dateFormatted = new Date(log.timestamp).toLocaleDateString('ko-KR', {
                          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                        });

                        return (
                          <div key={log.id} className="bg-white rounded-2xl p-3 border border-rose-50/50 shadow-sm flex items-center justify-between gap-3 text-xs animate-fadeIn">
                            <div className="flex items-center gap-2.5">
                              <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-bold border shrink-0 ${AVATAR_COLORS[log.avatarColorIdx || 0].class}`}>
                                {log.userName ? log.userName[0] : '무'}
                              </div>
                              <div className="font-medium text-slate-700">
                                <span className="font-bold text-slate-950">{log.userName}</span>
                                <span className="text-slate-500">님이 </span>
                                <span className="text-[#D35D50] font-bold bg-[#FFF0EF] px-1.5 py-0.5 rounded-lg border border-[#FFCCD4]/50">{log.book} {log.chapter}장</span>
                                <span className="text-slate-500"> 완료 도트를 채웠습니다!</span>
                              </div>
                            </div>
                            <span className="text-[9px] text-slate-400 font-mono shrink-0">{dateFormatted}</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

              </div>
            )}

            {/* --- TAB 2: 은혜 나눔 피드 --- */}
            {activeTab === 'shares' && (
              <div className="space-y-5">
                
                {/* 묵상 일지 폼 */}
                <form onSubmit={handlePostShare} className="bg-white rounded-3xl p-5 border border-rose-50 shadow-sm space-y-4">
                  <div className="flex items-center gap-1.5 pb-2 border-b border-rose-50">
                    <Icon name="MessageCircleHeart" className="text-[#E88B88]" />
                    <h3 className="text-xs font-bold text-slate-800 font-title">은혜의 말씀 일지 남기기</h3>
                  </div>

                  <div>
                    <textarea
                      rows="3"
                      value={newShareContent}
                      onChange={(e) => setNewShareContent(e.target.value)}
                      placeholder="오늘 성경 격자를 톡 터치하며 머릿속에 기억에 남은 생각이나 묵상을 적어 공유해 보세요..."
                      className="w-full bg-[#FFFDFB] border border-rose-100 rounded-2xl p-3.5 text-xs text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#E88B88] leading-relaxed font-medium"
                    />
                  </div>

                  <div className="flex items-center gap-3">
                    <div className="flex-1">
                      <input
                        type="text"
                        value={newShareRef}
                        onChange={(e) => setNewShareRef(e.target.value)}
                        placeholder="인용 말씀 (예: 시편 23:1)"
                        className="w-full bg-[#FFFDFB] border border-rose-100 rounded-2xl px-3.5 py-2.5 text-xs font-semibold text-slate-700 placeholder-slate-400 focus:outline-none"
                      />
                    </div>
                    <button
                      type="submit"
                      className="bg-[#E88B88] hover:bg-[#D47976] text-white text-xs font-bold py-2.5 px-5 rounded-2xl flex items-center gap-1.5 transition shrink-0 shadow-sm shadow-rose-100 font-title"
                    >
                      <Icon name="Send" className="w-3 h-3" />
                      발행
                    </button>
                  </div>
                </form>

                {/* 실시간 묵상 피드 */}
                <div className="space-y-4">
                  <h4 className="text-[10px] font-bold text-rose-400 tracking-widest uppercase font-title">FEED TIMELINE ({sortedShares.length})</h4>

                  {sortedShares.length === 0 ? (
                    <div className="bg-white rounded-3xl p-10 text-center border border-rose-50 text-slate-400">
                      <p className="text-xs font-medium">나누어진 묵상이 아직 없습니다</p>
                      <p className="text-[10px] mt-0.5">가장 와닿았던 한 구절을 적어 방을 가득 채워보세요.</p>
                    </div>
                  ) : (
                    <div className="space-y-3.5">
                      {sortedShares.map((share) => {
                        const isLikedByMe = currentUserId && share.likes && share.likes.includes(currentUserId);
                        const formattedDate = new Date(share.timestamp).toLocaleDateString('ko-KR', {
                          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                        });
                        const isMyShare = currentUserId && share.userId === currentUserId;

                        return (
                          <div key={share.id} className="bg-white rounded-3xl p-5 border border-rose-50/50 shadow-sm space-y-4 animate-fadeIn">
                            <div className="flex items-center justify-between">
                              <div className="flex items-center gap-2.5">
                                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold border shrink-0 ${AVATAR_COLORS[share.avatarColorIdx || 0].class}`}>
                                  {share.userName ? share.userName[0] : '무'}
                                }</div>
                                <div>
                                  <p className="text-xs font-bold text-slate-800">{share.userName}</p>
                                  <p className="text-[9px] text-slate-400 font-mono">{formattedDate}</p>
                                </div>
                              </div>

                              {isMyShare && (
                                <button
                                  onClick={() => handleDeleteShare(share.id)}
                                  className="text-slate-300 hover:text-rose-500 p-1 rounded-xl transition hover:bg-rose-50"
                                >
                                  <Icon name="Trash2" className="w-3 h-3" />
                                </button>
                              )}
                            </div>

                            <div className="space-y-2">
                              <p className="text-xs text-slate-700 leading-relaxed whitespace-pre-wrap font-medium">
                                {share.content}
                              </p>
                              {share.reference && (
                                <span className="inline-flex items-center gap-1 text-[9px] bg-[#FFF0EF] text-[#D35D50] font-bold px-2.5 py-1 rounded-lg border border-[#FFCCD4]/30 font-mono">
                                  🔖 {share.reference}
                                </span>
                              )}
                            </div>

                            <div className="pt-3 border-t border-rose-50/50 flex items-center justify-between text-[11px] font-medium">
                              <button
                                type="button"
                                onClick={() => handleToggleLike(share.id, share.likes)}
                                className={`flex items-center gap-1.5 transition ${
                                  isLikedByMe ? 'text-rose-500 font-bold' : 'text-slate-400 hover:text-rose-400'
                                }`}
                              >
                                <Icon name="Heart" className="w-3 h-3" fill={isLikedByMe ? 'currentColor' : 'none'} />
                                <span>공감 {share.likes ? share.likes.length : 0}</span>
                              </button>
                              <span className="text-[9px] text-rose-300 font-bold">기도하며 응원합니다</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

              </div>
            )}

            {/* --- TAB 3: 동역자들 현황 --- */}
            {activeTab === 'friends' && (
              <div className="space-y-4">
                
                <div className="bg-[#FFF8F7] rounded-3xl p-5 border border-rose-100/40 flex flex-col gap-4">
                  <div className="flex items-start gap-2.5">
                    <Icon name="Users" className="text-[#E88B88] mt-0.5 w-4 h-4" />
                    <div className="space-y-1">
                      <h4 className="text-xs font-bold text-[#D35D50] font-title">말씀 동행방에 동참하기</h4>
                      <p className="text-[10px] text-[#D35D50] leading-relaxed font-medium">
                        아래 생성된 예쁜 말씀방 링크를 친구에게 공유하면, 같은 바둑판 체크현황과 묵상을 실시간으로 나누며 동독을 이어갈 수 있습니다.
                      </p>
                    </div>
                  </div>

                  {/* 주소 복사 위젯 */}
                  <div className="bg-white p-2.5 rounded-2xl border border-rose-100/40 flex items-center justify-between gap-2.5">
                    <span className="text-[10px] text-slate-400 truncate select-all font-mono">
                      {`${window.location.origin}${window.location.pathname}#group-${groupId}`}
                    </span>
                    <button
                      onClick={handleCopyInviteLink}
                      className="bg-[#E88B88] text-white text-[10px] font-bold px-3 py-1.5 rounded-xl shrink-0 hover:bg-[#D47976] transition shadow-sm font-title"
                    >
                      초대 주소 복사
                    </button>
                  </div>
                </div>

                {/* 동역자 리스트 */}
                <div className="space-y-2.5">
                  {friendsProgress.map((friend, idx) => {
                    const isMe = currentUserId && friend.userId === currentUserId;

                    return (
                      <div key={friend.id} className="bg-white rounded-3xl p-4 border border-rose-50/50 shadow-sm flex items-center justify-between gap-3 text-xs animate-fadeIn">
                        <div className="flex items-center gap-3">
                          <span className="font-mono text-slate-300 w-3 text-center font-bold">{idx + 1}</span>
                          
                          <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border shrink-0 ${AVATAR_COLORS[friend.avatarColorIdx || 0].class}`}>
                            {friend.nickname ? friend.nickname[0] : '동'}
                          </div>

                          <div>
                            <div className="flex items-center gap-1.5">
                              <span className="font-bold text-slate-800">{friend.nickname}</span>
                              {isMe && <span className="text-[9px] bg-[#FFF0EF] text-[#D35D50] px-2 py-0.2 rounded-full font-bold border border-[#FFCCD4]/40 font-title">나</span>}
                            </div>
                            <p className="text-[10px] text-slate-400 mt-0.5 font-medium">
                              {friend.lastLog 
                                ? `마지막 체크: ${friend.lastLog.book} ${friend.lastLog.chapter}장` 
                                : '여정 출발을 준비하고 있습니다.'}
                            </p>
                          </div>
                        </div>

                        <div className="text-right">
                          <span className="font-bold text-[#D35D50] text-sm font-title">{friend.totalChapters}장</span>
                          <span className="text-[9px] text-slate-400 block font-medium">완독율 {Math.min(Math.round((friend.totalChapters / 1189) * 100), 100)}%</span>
                        </div>
                      </div>
                    );
                  })}
                </div>

              </div>
            )}

          </main>

          {/* --- Bottom Floating Nav Bar --- */}
          <footer className="absolute bottom-4 left-4 right-4 bg-white/90 backdrop-blur-md rounded-2xl border border-rose-100/40 p-3 shadow-lg flex items-center justify-between text-xs font-bold text-slate-500 z-10 shrink-0 font-title">
            <div className="flex items-center gap-2">
              <span className="relative flex h-2 w-2">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-60"></span>
                <span className="relative inline-flex rounded-full h-2 w-2 bg-rose-400"></span>
              </span>
              <span className="text-[10px] text-slate-600 font-semibold truncate max-w-[180px]">공유 말씀방: {groupName}</span>
            </div>
            <button
              onClick={handleCopyInviteLink}
              className="text-[10px] text-[#D35D50] hover:underline flex items-center gap-0.5 transition"
            >
              초대 복사 <Icon name="ChevronRight" className="w-3 h-3" />
            </button>
          </footer>

          {/* --- 수동 클라우드(Firebase) 입력 설정 모달 --- */}
          {showConfigModal && (
            <div className="fixed inset-0 bg-[#3A2222]/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm border border-rose-100 shadow-2xl space-y-4">
                <div className="text-center space-y-1">
                  <span className="text-2xl">⚙️</span>
                  <h2 className="text-base font-bold text-slate-900 font-title">나만의 평생 클라우드 연동</h2>
                  <p className="text-[10px] text-slate-400 leading-relaxed px-2 font-medium">
                    다운로드한 파일로 친구와 평생 무제한 실시간 연동을 하려면 본인의 무료 구글 Firebase 설정값을 입력해 주세요.
                  </p>
                </div>

                <div className="space-y-1">
                  <label className="block text-[10px] font-bold text-slate-400 font-title">Firebase Config JSON 코드</label>
                  <textarea
                    rows="5"
                    value={configInput}
                    onChange={(e) => setConfigInput(e.target.value)}
                    placeholder='{ "apiKey": "...", "projectId": "...", ... }'
                    className="w-full bg-[#FFFDFB] border border-rose-100 rounded-2xl p-3 text-[11px] font-mono text-slate-700 placeholder-slate-300 focus:outline-none focus:ring-2 focus:ring-[#E88B88]"
                  />
                </div>

                <div className="bg-rose-50/50 p-2.5 rounded-xl border border-rose-100 text-[10px] text-[#D35D50] font-medium leading-relaxed">
                  <p className="font-bold">💡 1분 초간단 발급 방법:</p>
                  <ol className="list-decimal pl-4 space-y-0.5 mt-1">
                    <li>firebase.google.com에 접속해 로그인합니다.</li>
                    <li>무료 새 프로젝트를 생성하고 웹(Web) 앱을 추가합니다.</li>
                    <li>화면에 뜬 <code className="bg-white/80 px-1 py-0.2 rounded font-mono">{"const firebaseConfig = { ... }"}</code> 내부 객체(중괄호 전체)를 그대로 복사해 여기에 붙여넣으면 평생 연동 완료!</li>
                  </ol>
                </div>

                <div className="flex gap-2 font-title">
                  <button
                    type="button"
                    onClick={handleResetCustomConfig}
                    className="flex-1 bg-stone-100 hover:bg-stone-200 text-stone-500 text-[11px] font-bold py-2.5 rounded-2xl transition"
                  >
                    연동 초기화
                  </button>
                  <button
                    type="button"
                    onClick={() => setShowConfigModal(false)}
                    className="flex-1 bg-slate-50 hover:bg-slate-100 text-slate-500 text-[11px] font-bold py-2.5 rounded-2xl transition"
                  >
                    취소
                  </button>
                  <button
                    type="button"
                    onClick={handleSaveCustomConfig}
                    className="flex-1 bg-[#E88B88] hover:bg-[#D47976] text-white text-[11px] font-bold py-2.5 rounded-2xl transition shadow-sm"
                  >
                    저장 후 적용
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* --- 🌸 수동 카톡 진도 공유 모달 --- */}
          {showCodeShareModal && (
            <div className="fixed inset-0 bg-[#3A2222]/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm border border-rose-100 shadow-2xl space-y-4">
                <div className="text-center space-y-1">
                  <span className="text-3xl">💬</span>
                  <h2 className="text-base font-bold text-slate-900 font-title">카톡으로 1초 진도 연동</h2>
                  <p className="text-[11px] text-slate-500 leading-relaxed px-2 font-medium">
                    인터넷 설정 없이 카톡 메시지만으로 친구와 진도를 주고받을 수 있습니다.
                  </p>
                </div>

                {/* 내보내기 구역 */}
                <div className="p-3.5 bg-[#FFF0EF] border border-rose-100 rounded-2xl space-y-2">
                  <h4 className="text-xs font-bold text-[#D35D50] font-title flex items-center gap-1">
                    <span>1. 내 진도 카톡방에 보내기</span>
                  </h4>
                  <p className="text-[10px] text-slate-400 leading-normal">
                    지금까지 체크한 내 스티커 진도를 텍스트 암호 코드로 변환해 카톡방에 복사해 줍니다.
                  </p>
                  <button
                    type="button"
                    onClick={handleExportMyCode}
                    className="w-full bg-[#E88B88] hover:bg-[#D47976] text-white text-[11px] font-bold py-2 rounded-xl transition font-title shadow-sm"
                  >
                    카톡용 진도 메세지 복사하기 💌
                  </button>
                </div>

                {/* 가져오기 구역 */}
                <div className="p-3.5 bg-rose-50/40 border border-rose-100/50 rounded-2xl space-y-2">
                  <h4 className="text-xs font-bold text-slate-700 font-title">2. 친구의 진도 붙여넣기</h4>
                  <p className="text-[10px] text-slate-400 leading-normal">
                    친구가 카톡방에 올린 진도표 메시지를 복사한 뒤, 아래 칸에 붙여넣어 주세요!
                  </p>
                  <textarea
                    rows="3"
                    value={friendCodeInput}
                    onChange={(e) => setFriendCodeInput(e.target.value)}
                    placeholder="여기에 친구가 복사해 준 카톡 메시지를 통째로 붙여넣어 주세요..."
                    className="w-full bg-white border border-rose-100 rounded-xl p-2.5 text-[10px] text-slate-700 placeholder-slate-300 focus:outline-none focus:ring-1 focus:ring-[#E88B88]"
                  />
                  <button
                    type="button"
                    onClick={handleImportFriendCode}
                    className="w-full bg-slate-800 hover:bg-slate-900 text-white text-[11px] font-bold py-2 rounded-xl transition font-title shadow-sm"
                  >
                    친구 진도 적용하기 🚀
                  </button>
                </div>

                {/* 닫기 */}
                <div className="flex justify-end pt-1">
                  <button
                    type="button"
                    onClick={() => setShowCodeShareModal(false)}
                    className="w-20 bg-slate-100 hover:bg-slate-200 text-slate-500 text-xs font-semibold py-2.5 rounded-xl transition font-title"
                  >
                    닫기
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* --- 프로필 설정 모달 --- */}
          {showProfileModal && (
            <div className="fixed inset-0 bg-rose-900/10 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm border border-rose-100 shadow-2xl space-y-5">
                <div className="text-center space-y-1.5">
                  <span className="text-2xl">🌱</span>
                  <h2 className="text-base font-bold text-slate-900 font-serif font-title">말씀 동행의 시작</h2>
                  <p className="text-[11px] text-slate-400 leading-normal px-2 font-medium">
                    친구들과 실시간으로 함께 읽고 은혜를 기록하는 말씀 동행방에 보일 이름과 아바타 테마를 꾸며 보세요!
                  </p>
                </div>

                {/* 닉네임 입력 */}
                <div className="space-y-2">
                  <label className="block text-[11px] font-bold text-slate-400 font-title">이름이나 별명</label>
                  <input
                    type="text"
                    value={nicknameInput}
                    onChange={(e) => setNicknameInput(e.target.value)}
                    placeholder="예: 예쁜하늘, 믿음이, 바울"
                    className="w-full bg-[#FFFDFB] border border-[#FFCCD4]/40 rounded-2xl px-3.5 py-3 text-xs font-semibold text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#E88B88]"
                    maxLength={10}
                  />
                </div>

                {/* 아바타 컬러 테마 */}
                <div className="space-y-2.5">
                  <label className="block text-[11px] font-bold text-slate-400 font-title">나의 아바타 젤리 컬러</label>
                  <div className="grid grid-cols-5 gap-2.5">
                    {AVATAR_COLORS.map((color, index) => (
                      <button
                        key={color.name}
                        type="button"
                        onClick={() => setSelectedColorIdx(index)}
                        className={`h-9 rounded-2xl flex items-center justify-center text-xs font-bold border transition-all ${
                          color.class
                        } ${
                          selectedColorIdx === index 
                            ? 'ring-2 ring-[#E88B88] ring-offset-2 scale-105 shadow-sm' 
                            : 'opacity-75 hover:opacity-100'
                        }`}
                      >
                        {nicknameInput ? nicknameInput[0] || '동' : '동'}
                      </button>
                    ))}
                  </div>
                </div>

                {/* 제어 버튼 */}
                <div className="flex gap-2 pt-1.5 font-title">
                  {currentUserProfile && (
                    <button
                      type="button"
                      onClick={() => setShowProfileModal(false)}
                      className="flex-1 bg-slate-50 hover:bg-slate-100 border border-slate-200/50 text-slate-400 text-xs font-semibold py-3 rounded-2xl transition"
                    >
                      닫기
                    </button>
                  )}
                  <button
                    type="button"
                    onClick={handleSaveProfile}
                    className="flex-1 bg-[#E88B88] hover:bg-[#D47976] text-white text-xs font-bold py-3 rounded-2xl transition shadow-sm shadow-rose-100"
                  >
                    여정 출발하기 🚀
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* --- Premium Toast Notification --- */}
          {showToast && (
            <div className="fixed bottom-20 left-1/2 -translate-x-1/2 bg-[#E88B88] text-white text-[11px] font-semibold py-2.5 px-5 rounded-xl shadow-lg z-50 text-center max-w-xs animate-bounce border border-rose-300 font-title font-title">
              🌸 {showToast}
            </div>
          )}

        </div>
      );
    }

    // React DOM Rendering to HTML
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />); // 수정: React 18에 맞는 올바른 JSX 엘리먼트 형식으로 변경
  </script>
</body>
</html>
