    // --- 수제형 완벽 매칭 SVG 아이콘 컴포넌트 ---

        ),
        Sparkles: (

      return svgs[name] || null;
    }

    function App() {
      // --- States ---
      const [user, setUser] = useState(null);
      const [currentUserProfile, setCurrentUserProfile] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      
      const [groupId, setGroupId] = useState('');
      const [groupName, setGroupName] = useState('우리 말씀 동행방 🌸');
      const [isEditingGroupName, setIsEditingGroupName] = useState(false);
      const [groupNameInput, setGroupNameInput] = useState('');

      const [allUsers, setAllUsers] = useState([]);
      const [allLogs, setAllLogs] = useState([]);
      const [allShares, setAllShares] = useState([]);
      const [allChecklists, setAllChecklists] = useState([]);
      const [allGroupSettings, setAllGroupSettings] = useState([]);

      const [activeTab, setActiveTab] = useState('tracker'); 
      const [randomVerse, setRandomVerse] = useState(DAILY_VERSES[0]);
      const [showToast, setShowToast] = useState(null);

      const [nicknameInput, setNicknameInput] = useState('');
      const [selectedColorIdx, setSelectedColorIdx] = useState(0);
      const [showProfileModal, setShowProfileModal] = useState(false);

      const [selectedBook, setSelectedBook] = useState('창세기');
      const [shareToFeed, setShareToFeed] = useState(true);

      const [newShareContent, setNewShareContent] = useState('');
      const [newShareRef, setNewShareRef] = useState('');

      const triggerToast = (msg) => {
        setShowToast(msg);
        setTimeout(() => {
          setShowToast(null);
        }, 3000);
      };

      // URL Hash 기반 공유방 ID 동기화
      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash;
          let currentGroup = '';
          if (hash && hash.startsWith('#group-')) {
            currentGroup = hash.replace('#group-', '');
          } else {
            currentGroup = 'mate-' + Math.random().toString(36).substring(2, 8);
            window.location.hash = '#group-' + currentGroup;
          }
          setGroupId(currentGroup);
        };

        handleHashChange();
        window.addEventListener('hashchange', handleHashChange);
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      // 인증 리스너 (Rule 3)
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Auth Error:", error);
            triggerToast("네트워크 인증 오류");
          } finally {
            setIsAuthLoading(false);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (firebaseUser) => {
          setUser(firebaseUser);
        });

        const randIdx = Math.floor(Math.random() * DAILY_VERSES.length);
        setRandomVerse(DAILY_VERSES[randIdx]);

        return () => unsubscribe();
      }, []);

      // 실시간 바인딩 (Rule 1 & Rule 2)
      useEffect(() => {
        if (!user || !groupId) return;

        const unsubscribeUsers = onSnapshot(
          collection(db, 'artifacts', appId, 'public', 'data', 'users'),
          (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            setAllUsers(list);

            const myProfileKey = `${user.uid}_${groupId}`;
            const myProfile = list.find(u => u.id === myProfileKey);
            if (myProfile) {
              setCurrentUserProfile(myProfile);
              setNicknameInput(myProfile.nickname || '');
              setSelectedColorIdx(myProfile.avatarColorIdx || 0);
            } else {
              setShowProfileModal(true);
            }
          }
        );

        const unsubscribeLogs = onSnapshot(
          collection(db, 'artifacts', appId, 'public', 'data', 'readingLogs'),
          (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            setAllLogs(list);
          }
        );

        const unsubscribeShares = onSnapshot(
          collection(db, 'artifacts', appId, 'public', 'data', 'shares'),
          (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            setAllShares(list);
          }
        );

        const unsubscribeChecklists = onSnapshot(
          collection(db, 'artifacts', appId, 'public', 'data', 'checklists'),
          (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            setAllChecklists(list);
          }
        );

        const unsubscribeGroupSettings = onSnapshot(
          collection(db, 'artifacts', appId, 'public', 'data', 'groupSettings'),
          (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
              list.push({ id: doc.id, ...doc.data() });
            });
            setAllGroupSettings(list);

            const currentSetting = list.find(g => g.id === groupId);
            if (currentSetting) {
              setGroupName(currentSetting.groupName);
              setGroupNameInput(currentSetting.groupName);
            } else {
              setGroupName('우리 말씀 동행방 🌸');
              setGroupNameInput('우리 말씀 동행방 🌸');
            }
          }
        );

        return () => {
          unsubscribeUsers();
          unsubscribeLogs();
          unsubscribeShares();
          unsubscribeChecklists();
          unsubscribeGroupSettings();
        };
      }, [user, groupId]);

      const handleCopyInviteLink = () => {
        const inviteUrl = `${window.location.origin}${window.location.pathname}#group-${groupId}`;
        const textArea = document.createElement("textarea");
        textArea.value = inviteUrl;
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        
        try {
          document.execCommand('copy');
          triggerToast("초대 링크가 복사되었습니다! 친구에게 보내어 함께해요 📬");
        } catch (err) {
          triggerToast("주소창 복사를 이용해 주세요.");
        }
        document.body.removeChild(textArea);
      };

      const handleSaveGroupName = async () => {
        if (!groupId) return;
        const trimmed = groupNameInput.trim();
        if (!trimmed) return;

        try {
          const groupRef = doc(db, 'artifacts', appId, 'public', 'data', 'groupSettings', groupId);
          await setDoc(groupRef, {
            groupName: trimmed,
            updatedAt: Date.now()
          }, { merge: true });
          setIsEditingGroupName(false);
          triggerToast(`방 이름이 예쁘게 변경되었습니다! 🌟`);
        } catch (err) {
          console.error(err);
        }
      };

      const handleSaveProfile = async () => {
        if (!user || !groupId) return;
        const trimmed = nicknameInput.trim();
        if (!trimmed) {
          triggerToast("이름을 정해 주세요!");
          return;
        }

        try {
          const userKey = `${user.uid}_${groupId}`;
          const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', userKey);
          await setDoc(userRef, {
            nickname: trimmed,
            avatarColorIdx: selectedColorIdx,
            groupId: groupId,
            userId: user.uid,
            updatedAt: Date.now()
          }, { merge: true });

          const checklistRef = doc(db, 'artifacts', appId, 'public', 'data', 'checklists', `${user.uid}_${groupId}`);
          await setDoc(checklistRef, {
            userId: user.uid,
            groupId: groupId,
            userName: trimmed,
            avatarColorIdx: selectedColorIdx
          }, { merge: true });

          setShowProfileModal(false);
          triggerToast(`환영합니다, ${trimmed}님! 함께 걸어보아요 ✨`);
        } catch (err) {
          console.error(err);
        }
      };

      const handleToggleChapter = async (bookName, chapterNum) => {
        if (!user || !currentUserProfile) {
          setShowProfileModal(true);
          return;
        }

        const checklistKey = `${user.uid}_${groupId}`;
        const myChecklistDoc = allChecklists.find(chk => chk.id === checklistKey);
        const currentChapters = myChecklistDoc?.chapters || {};
        const bookChapters = currentChapters[bookName] || [];
        
        let updatedChapters = [];
        let isCheckedOn = false;

        if (bookChapters.includes(chapterNum)) {
          updatedChapters = bookChapters.filter(c => c !== chapterNum);
          isCheckedOn = false;
        } else {
          updatedChapters = [...bookChapters, chapterNum];
          isCheckedOn = true;
        }

        const newChapters = { ...currentChapters, [bookName]: updatedChapters };

        try {
          const checklistRef = doc(db, 'artifacts', appId, 'public', 'data', 'checklists', checklistKey);
          await setDoc(checklistRef, {
            userId: user.uid,
            groupId: groupId,
            userName: currentUserProfile.nickname,
            avatarColorIdx: currentUserProfile.avatarColorIdx || 0,
            chapters: newChapters,
            updatedAt: Date.now()
          }, { merge: true });

          if (isCheckedOn) {
            const logRef = collection(db, 'artifacts', appId, 'public', 'data', 'readingLogs');
            await addDoc(logRef, {
              userId: user.uid,
              userName: currentUserProfile.nickname,
              avatarColorIdx: currentUserProfile.avatarColorIdx || 0,
              book: bookName,
              chapter: chapterNum,
              groupId: groupId,
              timestamp: Date.now()
            });

            if (shareToFeed) {
              const shareRef = collection(db, 'artifacts', appId, 'public', 'data', 'shares');
              await addDoc(shareRef, {
                userId: user.uid,
                userName: currentUserProfile.nickname,
                avatarColorIdx: currentUserProfile.avatarColorIdx || 0,
                content: `🌸 ${currentUserProfile.nickname}님이 ${bookName} ${chapterNum}장을 읽었습니다!`,
                reference: `${bookName} ${chapterNum}장`,
                groupId: groupId,
                timestamp: Date.now(),
                likes: []
              });
            }
          }
        } catch (err) {
          console.error(err);
        }
      };

      const handleSetAllChapters = async (bookName, totalChapters, value) => {
        if (!user || !currentUserProfile) {
          setShowProfileModal(true);
          return;
        }
        const checklistKey = `${user.uid}_${groupId}`;
        const myChecklistDoc = allChecklists.find(chk => chk.id === checklistKey);
        const currentChapters = myChecklistDoc?.chapters || {};

        let updatedChapters = [];
        if (value) {
          updatedChapters = Array.from({ length: totalChapters }, (_, i) => i + 1);
        }

        const newChapters = { ...currentChapters, [bookName]: updatedChapters };

        try {
          const checklistRef = doc(db, 'artifacts', appId, 'public', 'data', 'checklists', checklistKey);
          await setDoc(checklistRef, {
            userId: user.uid,
            groupId: groupId,
            userName: currentUserProfile.nickname,
            avatarColorIdx: currentUserProfile.avatarColorIdx || 0,
            chapters: newChapters,
            updatedAt: Date.now()
          }, { merge: true });

          const logRef = collection(db, 'artifacts', appId, 'public', 'data', 'readingLogs');
          await addDoc(logRef, {
            userId: user.uid,
            userName: currentUserProfile.nickname,
            avatarColorIdx: currentUserProfile.avatarColorIdx || 0,
            book: bookName,
            chapter: value ? `1~${totalChapters}` : '초기화',
            groupId: groupId,
            timestamp: Date.now()
          });

          triggerToast(value ? `🎉 ${bookName} 전부 읽음 처리 완료!` : `✨ ${bookName} 비우기 완료.`);
        } catch (err) {
          console.error(err);
        }
      };

      const handlePostShare = async (e) => {
        e.preventDefault();
        if (!user || !currentUserProfile) {
          triggerToast("프로필을 완료해 주세요.");
          return;
        }

        if (!newShareContent.trim()) {
          triggerToast("나눌 내용을 작성해 주세요.");
          return;
        }

        try {
          const shareRef = collection(db, 'artifacts', appId, 'public', 'data', 'shares');
          await addDoc(shareRef, {
            userId: user.uid,
            userName: currentUserProfile.nickname,
            avatarColorIdx: currentUserProfile.avatarColorIdx || 0,
            content: newShareContent,
            reference: newShareRef.trim() || null,
            groupId: groupId,
            timestamp: Date.now(),
            likes: []
          });

          setNewShareContent('');
          setNewShareRef('');
          triggerToast("묵상이 등록되었습니다! 💌");
        } catch (err) {
          console.error(err);
        }
      };

      const handleDeleteShare = async (shareId) => {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shares', shareId));
          triggerToast("나눔을 정돈했습니다.");
        } catch (err) {
          console.error(err);
        }
      };

      const handleToggleLike = async (shareId, currentLikes = []) => {
        if (!user) return;
        const shareDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'shares', shareId);
        
        try {
          if (currentLikes.includes(user.uid)) {
            await updateDoc(shareDocRef, { likes: arrayRemove(user.uid) });
          } else {
            await updateDoc(shareDocRef, { likes: arrayUnion(user.uid) });
          }
        } catch (err) {
          console.error(err);
        }
      };

      // 실시간 데이터 가공 (In-Memory Filtering)
      const activeUsers = allUsers.filter(u => u.groupId === groupId);
      const activeLogs = allLogs.filter(log => log.groupId === groupId);
      const activeShares = allShares.filter(share => share.groupId === groupId);
      const activeChecklists = allChecklists.filter(chk => chk.groupId === groupId);

      const sortedShares = [...activeShares].sort((a, b) => b.timestamp - a.timestamp);
      const sortedLogs = [...activeLogs].sort((a, b) => b.timestamp - a.timestamp);

      const myChecklistData = user ? activeChecklists.find(chk => chk.userId === user.uid) : null;
      const myReadMap = myChecklistData?.chapters || {};

      const friendsProgress = activeUsers.map(u => {
        const friendChecklist = activeChecklists.find(chk => chk.userId === u.userId);
        const chaptersMap = friendChecklist?.chapters || {};
        
        let totalChapters = 0;
        Object.keys(chaptersMap).forEach(book => {
          totalChapters += (chaptersMap[book] || []).length;
        });

        const userLogs = activeLogs.filter(log => log.userId === u.userId);
        const lastLog = userLogs.length > 0
          ? [...userLogs].sort((a, b) => b.timestamp - a.timestamp)[0]
          : null;

        return {
          ...u,
          totalChapters,
          lastLog
        };
      }).sort((a, b) => b.totalChapters - a.totalChapters);

      const groupTotalChapters = friendsProgress.reduce((sum, friend) => sum + (friend.totalChapters || 0), 0);
      const readingGoal = 1189; 
      const progressPercent = Math.min(Math.round((groupTotalChapters / readingGoal) * 100), 100);

      const currentBookObj = BIBLE_BOOKS.find(b => b.name === selectedBook) || BIBLE_BOOKS[0];
      const totalChaptersOfSelected = currentBookObj.chapters;
      const myReadInSelectedBook = myReadMap[selectedBook] || [];

      const handleRefreshVerse = () => {
        const currentIdx = DAILY_VERSES.findIndex(v => v.text === randomVerse.text);
        let nextIdx = Math.floor(Math.random() * DAILY_VERSES.length);
        while (nextIdx === currentIdx && DAILY_VERSES.length > 1) {
          nextIdx = Math.floor(Math.random() * DAILY_VERSES.length);
        }
        setRandomVerse(DAILY_VERSES[nextIdx]);
      };

      if (isAuthLoading) {
        return (
          <div className="min-h-screen bg-[#FFFDFB] flex flex-col items-center justify-center p-6 text-center">
            <div className="bg-[#FFE8E5] text-[#D35D50] p-4 rounded-3xl animate-bounce mb-3 shadow-sm shadow-rose-100">
              <Icon name="BookHeart" className="w-8 h-8" />
            </div>
            <h2 className="text-sm font-bold text-slate-800 tracking-tight font-title">동행하는 중...</h2>
            <p className="text-[11px] text-rose-400 font-semibold mt-1">실시간 말씀 동행방에 곧 입장합니다.</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#FFFDFB] text-slate-800 font-sans antialiased flex flex-col max-w-lg mx-auto shadow-2xl relative border-x border-rose-100/30">
          
          {/* --- Top App Header --- */}
          <header className="bg-white/95 backdrop-blur-md border-b border-rose-100/60 px-6 py-4 sticky top-0 z-20 space-y-3 shadow-sm">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2.5">
                <div className="bg-[#E88B88] text-white p-2.5 rounded-2xl shadow-sm shadow-rose-200">
                  <Icon name="BookHeart" className="w-4 h-4 animate-pulse" />
                </div>
                <div>
                  {isEditingGroupName ? (
                    <div className="flex items-center gap-1.5 mt-0.5">
                      <input
                        type="text"
                        value={groupNameInput}
                        onChange={(e) => setGroupNameInput(e.target.value)}
                        className="border border-rose-200 rounded-xl px-2.5 py-1 text-xs font-semibold text-slate-800 focus:outline-none focus:ring-2 focus:ring-[#E88B88]"
                        maxLength={20}
                      />
                      <button 
                        onClick={handleSaveGroupName} 
                        className="bg-[#E88B88] hover:bg-[#D47976] text-white px-2.5 py-1 rounded-lg text-[10px] font-bold"
                      >
                        완료
                      </button>
                    </div>
                  ) : (
                    <h1 className="text-sm font-bold text-slate-900 tracking-tight flex items-center gap-1.5 font-title">
                      {groupName}
                      <button onClick={() => setIsEditingGroupName(true)} className="text-[#E88B88] hover:text-[#D47976] transition p-0.5 rounded-lg hover:bg-rose-50">
                        <Icon name="Edit2" className="w-3 h-3" />
                      </button>
                    </h1>
                  )}
                  <p className="text-[10px] text-rose-400 font-mono tracking-wider mt-0.5">ROOM: {groupId}</p>
                </div>
              </div>

              <div>
                <button
                  onClick={handleCopyInviteLink}
                  className="flex items-center gap-1.5 bg-[#FFF0EF] text-[#D35D50] hover:bg-[#FFE0DD] border border-[#FFCCD4] py-1.5 px-3.5 rounded-full text-xs font-semibold transition shadow-none font-title"
                >
                  <Icon name="Share2" className="w-3 h-3" />
                  <span>동행 초대</span>
                </button>
              </div>
            </div>

            {/* 내 정보 위젯 */}
            <div className="flex items-center justify-between bg-[#FCF8F5] border border-rose-100/50 rounded-2xl px-4 py-2.5 text-xs">
              <div className="flex items-center gap-2">
                <span className="relative flex h-2 w-2">
                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-60"></span>
                  <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-400"></span>
                </span>
                <span className="text-slate-500 font-medium font-title">동행 멤버 <span className="text-slate-800 font-bold">{activeUsers.length}명</span></span>
              </div>

              {currentUserProfile ? (
                <button 
                  onClick={() => {
                    setNicknameInput(currentUserProfile.nickname);
                    setSelectedColorIdx(currentUserProfile.avatarColorIdx || 0);
                    setShowProfileModal(true);
                  }}
                  className="flex items-center gap-1.5 text-slate-700 hover:text-slate-900 font-medium"
                >
                  <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[9px] font-bold border ${AVATAR_COLORS[currentUserProfile.avatarColorIdx || 0].class}`}>
                    {currentUserProfile.nickname ? currentUserProfile.nickname[0] : '나'}
                  </div>
                  <span className="font-semibold">{currentUserProfile.nickname}</span>
                  <Icon name="Settings" className="w-3 h-3 text-rose-300" />
                </button>
              ) : (
                <button 
                  onClick={() => setShowProfileModal(true)}
                  className="text-[10px] text-[#D35D50] font-bold hover:underline"
                >
                  이름 정하기 ✏️
                </button>
              )}
            </div>
          </header>

          {/* --- Main Content --- */}
          <main className="flex-1 p-5 pb-24 space-y-6 overflow-y-auto">

            {/* 오늘의 말씀 */}
            <div className="bg-gradient-to-tr from-[#FFF2F0] to-[#FFF9F5] rounded-3xl p-5 border border-rose-100/60 relative overflow-hidden">
              <div className="flex justify-between items-center mb-3">
                <span className="text-[10px] font-black text-[#D35D50] tracking-widest uppercase flex items-center gap-1 font-title">
                  <Icon name="Sparkles" className="w-3 h-3 text-[#E88B88]" /> 오늘의 말씀 묵상
                </span>
                <button 
                  onClick={handleRefreshVerse}
                  className="text-[9px] text-[#D35D50] bg-white hover:bg-rose-50 border border-rose-200 px-2.5 py-0.5 rounded-full transition font-title"
                >
                  새 말씀 ↻
                </button>
              </div>
              <p className="text-slate-800 font-medium text-xs leading-relaxed mb-2.5 tracking-tight">
                "{randomVerse.text}"
              </p>
              <p className="text-[10px] font-bold text-[#E88B88] text-right font-title">
                — {randomVerse.ref}
              </p>
            </div>

            {/* 완독 게이지 */}
            <div className="bg-white rounded-3xl p-5 border border-rose-50/50 shadow-sm space-y-3">
              <div className="flex justify-between items-center">
                <div>
                  <h3 className="text-[10px] font-bold text-rose-400 tracking-widest font-title">BIBLE TRAIL PROGRESS</h3>
                  <p className="text-xs text-slate-600 mt-0.5">우리들의 말씀 진도가 <span className="text-[#D35D50] font-extrabold">{groupTotalChapters}장</span>에 도달했습니다!</p>
                </div>
                <div className="text-right">
                  <span className="text-sm font-black text-[#D35D50] font-title">{progressPercent}%</span>
                  <span className="text-[9px] text-slate-400 block font-bold">목표 1189장</span>
                </div>
              </div>
              <div className="w-full bg-rose-50 rounded-full h-2.5 overflow-hidden border border-rose-100/20">
                <div 
                  className="bg-gradient-to-r from-rose-300 to-[#E88B88] h-full rounded-full transition-all duration-1000 ease-out" 
                  style={{ width: `${progressPercent}%` }}
                />
              </div>
            </div>

            {/* 탭 선택바 */}
            <div className="flex bg-[#FFF5F2] p-1.5 rounded-2xl border border-rose-100/30">
              <button
                onClick={() => setActiveTab('tracker')}
                className={`flex-1 flex items-center justify-center gap-1.5 py-2.5 text-xs font-bold rounded-xl transition font-title ${
                  activeTab === 'tracker' 
                    ? 'bg-white text-[#D35D50] shadow-sm font-black' 
                    : 'text-slate-400 hover:text-slate-700'
                }`}
              >
                <Icon name="CheckCircle2" className="w-3 h-3" />
                스티커 체크
              </button>
              <button
                onClick={() => setActiveTab('shares')}
                className={`flex-1 flex items-center justify-center gap-1.5 py-2.5 text-xs font-bold rounded-xl transition font-title ${
                  activeTab === 'shares' 
                    ? 'bg-white text-[#D35D50] shadow-sm font-black' 
                    : 'text-slate-400 hover:text-slate-700'
                }`}
              >
                <Icon name="MessageCircleHeart" className="w-3 h-3" />
                은혜 나눔
              </button>
              <button
                onClick={() => setActiveTab('friends')}
                className={`flex-1 flex items-center justify-center gap-1.5 py-2.5 text-xs font-bold rounded-xl transition font-title ${
                  activeTab === 'friends' 
                    ? 'bg-white text-[#D35D50] shadow-sm font-black' 
                    : 'text-slate-400 hover:text-slate-700'
                }`}
              >
                <Icon name="Users" className="w-3 h-3" />
                동역자들
              </button>
            </div>

            {/* --- TAB 1: 스티커 체크보드 --- */}
            {activeTab === 'tracker' && (
              <div className="space-y-5">
                
                <div className="bg-white rounded-3xl p-5 border border-rose-100/30 shadow-sm space-y-4">
                  <div className="flex items-center justify-between gap-3 pb-3 border-b border-rose-50">
                    <div className="flex items-center gap-1.5">
                      <Icon name="BookOpen" className="text-[#E88B88] w-4 h-4" />
                      <span className="text-xs font-bold text-slate-800 font-title">성경 탐색</span>
                    </div>
                    
                    <div className="relative">
                      <select
                        value={selectedBook}
                        onChange={(e) => setSelectedBook(e.target.value)}
                        className="bg-[#FFFDFB] border border-rose-100/80 rounded-xl pl-3 pr-8 py-1.5 text-xs font-bold text-slate-700 appearance-none focus:outline-none focus:ring-2 focus:ring-[#E88B88]"
                      >
                        {BIBLE_BOOKS.map((b) => (
                          <option key={b.name} value={b.name}>
                            [{b.type}] {b.name} ({b.chapters}장)
                          </option>
                        ))}
                      </select>
                      <div className="absolute inset-y-0 right-2.5 flex items-center pointer-events-none text-rose-400">
                        <Icon name="ChevronDown" className="w-3 h-3" />
                      </div>
                    </div>
                  </div>

                  {/* 일괄 완료 및 초기화 */}
                  <div className="flex items-center justify-between text-[11px] bg-[#FFFBF9] p-3 rounded-2xl border border-rose-100/30">
                    <div>
                      <span className="font-extrabold text-[#D35D50] font-title">{selectedBook} </span>
                      <span className="text-slate-400 font-medium">나의 동독:</span>{' '}
                      <span className="font-bold text-slate-800">{myReadInSelectedBook.length} / {totalChaptersOfSelected}장</span>
                    </div>
                    <div className="flex gap-1.5">
                      <button
                        type="button"
                        onClick={() => handleSetAllChapters(selectedBook, totalChaptersOfSelected, true)}
                        className="bg-[#FFE8E5] text-[#D35D50] hover:bg-[#FFD2CC] font-bold px-2.5 py-1 rounded-lg transition text-[10px] font-title"
                      >
                        전부완료
                      </button>
                      <button
                        type="button"
                        onClick={() => handleSetAllChapters(selectedBook, totalChaptersOfSelected, false)}
                        className="bg-slate-100 text-slate-400 hover:bg-slate-200 font-bold px-2.5 py-1 rounded-lg transition text-[10px] font-title"
                      >
                        비우기
                      </button>
                    </div>
                  </div>

                  {/* 피드 옵션 */}
                  <div className="flex items-center justify-between text-[10px] text-slate-400 px-1 font-medium">
                    <label className="flex items-center gap-1.5 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={shareToFeed}
                        onChange={(e) => setShareToFeed(e.target.checked)}
                        className="rounded text-[#E88B88] focus:ring-[#E88B88] w-3.5 h-3.5"
                      />
                      <span className="font-semibold text-slate-500">체크할 때마다 은혜나눔에도 소식 알리기</span>
                    </label>
                  </div>

                  {/* 격자형 스티커 체크보드 */}
                  <div className="bg-[#FCF8F5] p-3.5 rounded-2xl border border-rose-100/30">
                    <div className="grid grid-cols-7 sm:grid-cols-8 gap-1.5">
                      {Array.from({ length: totalChaptersOfSelected }, (_, i) => i + 1).map((chapterNum) => {
                        const isMyChapterRead = myReadInSelectedBook.includes(chapterNum);
                        
                        const readersOfThisChapter = activeChecklists.filter(chk => {
                          const chapArr = chk.chapters?.[selectedBook] || [];
                          return chapArr.includes(chapterNum);
                        });

                        return (
                          <button
                            key={chapterNum}
                            type="button"
                            onClick={() => handleToggleChapter(selectedBook, chapterNum)}
                            className={`relative rounded-xl flex flex-col items-center justify-center p-1.5 w-full aspect-square border sticker-btn ${
                              isMyChapterRead 
                                ? 'bg-[#E88B88] text-white border-[#E88B88] shadow-sm shadow-rose-200/50 font-bold font-title' 
                                : 'bg-white text-slate-500 border-slate-200/60 hover:border-rose-300 font-semibold'
                            }`}
                          >
                            <span className="text-[11px] font-mono leading-none">{chapterNum}</span>

                            {readersOfThisChapter.length > 0 && (
                              <div className="absolute bottom-1 flex gap-0.5 justify-center max-w-full">
                                {readersOfThisChapter.slice(0, 3).map((chkUser) => {
                                  const isMeInCheck = user && chkUser.userId === user.uid;
                                  const avatarColor = AVATAR_COLORS[chkUser.avatarColorIdx || 0];

                                  return (
                                    <span
                                      key={chkUser.id}
                                      title={chkUser.userName}
                                      className={`w-1 h-1 rounded-full shrink-0 block ${
                                        isMeInCheck ? 'bg-white border-[0.5px] border-[#D35D50]' : avatarColor.class
                                      }`}
                                    />
                                  );
                                })}
                              </div>
                            )}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>

                {/* 최근 읽기 활동 스트림 */}
                <div className="space-y-3">
                  <h4 className="text-[10px] font-bold text-rose-400 tracking-widest flex items-center gap-1.5 font-title">
                    <Icon name="Flame" className="text-rose-400 animate-bounce" /> RECENT STREAM
                  </h4>

                  {sortedLogs.length === 0 ? (
                    <div className="bg-white rounded-2xl p-8 text-center border border-rose-50 text-slate-400">
                      <p className="text-xs font-semibold">아직 아무 발자국도 찍히지 않았어요!</p>
                      <p className="text-[10px] mt-0.5">첫 스티커를 부착해서 선두 주자가 되어보세요!</p>
                    </div>
                  ) : (
                    <div className="space-y-1.5">
                      {sortedLogs.slice(0, 6).map((log) => {
                        const dateFormatted = new Date(log.timestamp).toLocaleDateString('ko-KR', {
                          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                        });

                        return (
                          <div key={log.id} className="bg-white rounded-2xl p-3 border border-rose-50/50 shadow-sm flex items-center justify-between gap-3 text-xs">
                            <div className="flex items-center gap-2.5">
                              <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-bold border shrink-0 ${AVATAR_COLORS[log.avatarColorIdx || 0].class}`}>
                                {log.userName ? log.userName[0] : '무'}
                              </div>
                              <div className="font-medium text-slate-700">
                                <span className="font-bold text-slate-950">{log.userName}</span>
                                <span className="text-slate-500">님이 </span>
                                <span className="text-[#D35D50] font-bold bg-[#FFF0EF] px-1.5 py-0.5 rounded-lg border border-[#FFCCD4]/50 font-title">{log.book} {log.chapter}장</span>
                                <span className="text-slate-500"> 완료 도트를 채웠습니다!</span>
                              </div>
                            </div>
                            <span className="text-[9px] text-slate-400 font-mono shrink-0">{dateFormatted}</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

              </div>
            )}

            {/* --- TAB 2: 은혜 나눔 피드 --- */}
            {activeTab === 'shares' && (
              <div className="space-y-5">
                
                {/* 묵상 일지 폼 */}
                <form onSubmit={handlePostShare} className="bg-white rounded-3xl p-5 border border-rose-50 shadow-sm space-y-4">
                  <div className="flex items-center gap-1.5 pb-2 border-b border-rose-50">
                    <Icon name="MessageCircleHeart" className="text-[#E88B88]" />
                    <h3 className="text-xs font-bold text-slate-800 font-title">은혜의 말씀 일지 남기기</h3>
                  </div>

                  <div>
                    <textarea
                      rows="3"
                      value={newShareContent}
                      onChange={(e) => setNewShareContent(e.target.value)}
                      placeholder="오늘 성경 격자를 톡 터치하며 머릿속에 기억에 남은 생각이나 묵상을 적어 공유해 보세요..."
                      className="w-full bg-[#FFFDFB] border border-rose-100 rounded-2xl p-3.5 text-xs text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#E88B88] leading-relaxed font-medium"
                    />
                  </div>

                  <div className="flex items-center gap-3">
                    <div className="flex-1">
                      <input
                        type="text"
                        value={newShareRef}
                        onChange={(e) => setNewShareRef(e.target.value)}
                        placeholder="인용 말씀 (예: 시편 23:1)"
                        className="w-full bg-[#FFFDFB] border border-rose-100 rounded-2xl px-3.5 py-2.5 text-xs font-semibold text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#E88B88]"
                      />
                    </div>
                    <button
                      type="submit"
                      className="bg-[#E88B88] hover:bg-[#D47976] text-white text-xs font-bold py-2.5 px-5 rounded-2xl flex items-center gap-1.5 transition shrink-0 shadow-sm shadow-rose-100 font-title"
                    >
                      <Icon name="Send" className="w-3 h-3" />
                      발행
                    </button>
                  </div>
                </form>

                {/* 실시간 묵상 피드 */}
                <div className="space-y-4">
                  <h4 className="text-[10px] font-bold text-rose-400 tracking-widest uppercase font-title">FEED TIMELINE ({sortedShares.length})</h4>

                  {sortedShares.length === 0 ? (
                    <div className="bg-white rounded-3xl p-10 text-center border border-rose-50 text-slate-400">
                      <p className="text-xs font-medium">나누어진 묵상이 아직 없습니다</p>
                      <p className="text-[10px] mt-0.5">가장 와닿았던 한 구절을 적어 방을 가득 채워보세요.</p>
                    </div>
                  ) : (
                    <div className="space-y-3.5">
                      {sortedShares.map((share) => {
                        const isLikedByMe = user && share.likes && share.likes.includes(user.uid);
                        const formattedDate = new Date(share.timestamp).toLocaleDateString('ko-KR', {
                          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                        });
                        const isMyShare = user && share.userId === user.uid;

                        return (
                          <div key={share.id} className="bg-white rounded-3xl p-5 border border-rose-50/50 shadow-sm space-y-4">
                            <div className="flex items-center justify-between">
                              <div className="flex items-center gap-2.5">
                                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold border shrink-0 ${AVATAR_COLORS[share.avatarColorIdx || 0].class}`}>
                                  {share.userName ? share.userName[0] : '무'}
                                </div>
                                <div>
                                  <p className="text-xs font-bold text-slate-800">{share.userName}</p>
                                  <p className="text-[9px] text-slate-400 font-mono">{formattedDate}</p>
                                </div>
                              </div>

                              {isMyShare && (
                                <button
                                  onClick={() => handleDeleteShare(share.id)}
                                  className="text-slate-300 hover:text-rose-500 p-1 rounded-xl transition hover:bg-rose-50"
                                >
                                  <Icon name="Trash2" className="w-3 h-3" />
                                </button>
                              )}
                            </div>

                            <div className="space-y-2">
                              <p className="text-xs text-slate-700 leading-relaxed whitespace-pre-wrap font-medium">
                                {share.content}
                              </p>
                              {share.reference && (
                                <span className="inline-flex items-center gap-1 text-[9px] bg-[#FFF0EF] text-[#D35D50] font-bold px-2.5 py-1 rounded-lg border border-[#FFCCD4]/30 font-mono font-title">
                                  🔖 {share.reference}
                                </span>
                              )}
                            </div>

                            <div className="pt-3 border-t border-rose-50/50 flex items-center justify-between text-[11px] font-medium">
                              <button
                                type="button"
                                onClick={() => handleToggleLike(share.id, share.likes)}
                                className={`flex items-center gap-1.5 transition ${
                                  isLikedByMe ? 'text-rose-500 font-bold' : 'text-slate-400 hover:text-rose-400'
                                }`}
                              >
                                <Icon name="Heart" className="w-3 h-3" fill={isLikedByMe ? 'currentColor' : 'none'} />
                                <span>공감 {share.likes ? share.likes.length : 0}</span>
                              </button>
                              <span className="text-[9px] text-rose-300 font-bold">기도하며 응원합니다</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

              </div>
            )}

            {/* --- TAB 3: 동역자들 현황 --- */}
            {activeTab === 'friends' && (
              <div className="space-y-4">
                
                <div className="bg-[#FFF8F7] rounded-3xl p-5 border border-rose-100/40 flex flex-col gap-4">
                  <div className="flex items-start gap-2.5">
                    <Icon name="Users" className="text-[#E88B88] mt-0.5 w-4 h-4" />
                    <div className="space-y-1">
                      <h4 className="text-xs font-bold text-[#D35D50] font-title">말씀 동행방에 동참하기</h4>
                      <p className="text-[10px] text-[#D35D50] leading-relaxed font-medium">
                        아래 생성된 예쁜 말씀방 링크를 친구에게 공유하면, 같은 바둑판 체크현황과 묵상을 실시간으로 나누며 동독을 이어갈 수 있습니다.
                      </p>
                    </div>
                  </div>

                  {/* 주소 복사 위젯 */}
                  <div className="bg-white p-2.5 rounded-2xl border border-rose-100/40 flex items-center justify-between gap-2.5">
                    <span className="text-[10px] text-slate-400 truncate select-all font-mono">
                      {`${window.location.origin}${window.location.pathname}#group-${groupId}`}
                    </span>
                    <button
                      onClick={handleCopyInviteLink}
                      className="bg-[#E88B88] text-white text-[10px] font-bold px-3 py-1.5 rounded-xl shrink-0 hover:bg-[#D47976] transition shadow-sm font-title"
                    >
                      초대 주소 복사
                    </button>
                  </div>
                </div>

                {/* 동역자 리스트 */}
                <div className="space-y-2.5">
                  {friendsProgress.map((friend, idx) => {
                    const isMe = user && friend.userId === user.uid;

                    return (
                      <div key={friend.id} className="bg-white rounded-3xl p-4 border border-rose-50/50 shadow-sm flex items-center justify-between gap-3 text-xs">
                        <div className="flex items-center gap-3">
                          <span className="font-mono text-slate-300 w-3 text-center font-bold">{idx + 1}</span>
                          
                          <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border shrink-0 ${AVATAR_COLORS[friend.avatarColorIdx || 0].class}`}>
                            {friend.nickname ? friend.nickname[0] : '동'}
                          </div>

                          <div>
                            <div className="flex items-center gap-1.5">
                              <span className="font-bold text-slate-800">{friend.nickname}</span>
                              {isMe && <span className="text-[9px] bg-[#FFF0EF] text-[#D35D50] px-2 py-0.2 rounded-full font-bold border border-[#FFCCD4]/40 font-title">나</span>}
                            </div>
                            <p className="text-[10px] text-slate-400 mt-0.5 font-medium">
                              {friend.lastLog 
                                ? `마지막 체크: ${friend.lastLog.book} ${friend.lastLog.chapter}장` 
                                : '여정 출발을 준비하고 있습니다.'}
                            </p>
                          </div>
                        </div>

                        <div className="text-right">
                          <span className="font-bold text-[#D35D50] text-sm font-title">{friend.totalChapters}장</span>
                          <span className="text-[9px] text-slate-400 block font-medium">완독율 {Math.min(Math.round((friend.totalChapters / 1189) * 100), 100)}%</span>
                        </div>
                      </div>
                    );
                  })}
                </div>

              </div>
            )}

          </main>

          {/* --- Bottom Floating Nav Bar --- */}
          <footer className="absolute bottom-4 left-4 right-4 bg-white/90 backdrop-blur-md rounded-2xl border border-rose-100/40 p-3 shadow-lg flex items-center justify-between text-xs font-bold text-slate-500 z-10">
            <div className="flex items-center gap-2">
              <span className="relative flex h-2 w-2">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-60"></span>
                <span className="relative inline-flex rounded-full h-2 w-2 bg-rose-400"></span>
              </span>
              <span className="text-[10px] text-slate-600 font-semibold truncate max-w-[180px] font-title">공유 말씀방: {groupName}</span>
            </div>
            <button
              onClick={handleCopyInviteLink}
              className="text-[10px] text-[#D35D50] hover:underline flex items-center gap-0.5 transition font-title"
            >
              초대 복사 <Icon name="ChevronRight" className="w-3 h-3" />
            </button>
          </footer>

          {/* --- 프로필 설정 모달 --- */}
          {showProfileModal && (
            <div className="fixed inset-0 bg-rose-900/10 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm border border-rose-100 shadow-2xl space-y-5">
                <div className="text-center space-y-1.5">
                  <span className="text-2xl">🌱</span>
                  <h2 className="text-base font-bold text-slate-900 font-title">말씀 동행의 시작</h2>
                  <p className="text-[11px] text-slate-400 leading-normal px-2 font-medium">
                    친구들과 실시간으로 함께 읽고 은혜를 기록하는 말씀 동행방에 보일 이름과 아바타 테마를 꾸며 보세요!
                  </p>
                </div>

                {/* 닉네임 입력 */}
                <div className="space-y-2">
                  <label className="block text-[11px] font-bold text-slate-400 font-title">이름이나 별명</label>
                  <input
                    type="text"
                    value={nicknameInput}
                    onChange={(e) => setNicknameInput(e.target.value)}
                    placeholder="예: 예쁜하늘, 믿음이, 바울"
                    className="w-full bg-[#FFFDFB] border border-rose-100 rounded-2xl px-3.5 py-3 text-xs font-semibold text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#E88B88]"
                    maxLength={10}
                  />
                </div>

                {/* 아바타 컬러 테마 */}
                <div className="space-y-2.5">
                  <label className="block text-[11px] font-bold text-slate-400 font-title">나의 아바타 젤리 컬러</label>
                  <div className="grid grid-cols-5 gap-2.5">
                    {AVATAR_COLORS.map((color, index) => (
                      <button
                        key={color.name}
                        type="button"
                        onClick={() => setSelectedColorIdx(index)}
                        className={`h-9 rounded-2xl flex items-center justify-center text-xs font-bold border transition-all ${
                          color.class
                        } ${
                          selectedColorIdx === index 
                            ? 'ring-2 ring-[#E88B88] ring-offset-2 scale-105 shadow-sm' 
                            : 'opacity-75 hover:opacity-100'
                        }`}
                      >
                        {nicknameInput ? nicknameInput[0] || '동' : '동'}
                      </button>
                    ))}
                  </div>
                </div>

                {/* 제어 버튼 */}
                <div className="flex gap-2 pt-1.5">
                  {currentUserProfile && (
                    <button
                      type="button"
                      onClick={() => setShowProfileModal(false)}
                      className="flex-1 bg-slate-50 hover:bg-slate-100 border border-slate-200/50 text-slate-400 text-xs font-semibold py-3 rounded-2xl transition font-title"
                    >
                      닫기
                    </button>
                  )}
                  <button
                    type="button"
                    onClick={handleSaveProfile}
                    className="flex-1 bg-[#E88B88] hover:bg-[#D47976] text-white text-xs font-bold py-3 rounded-2xl transition shadow-sm shadow-rose-100 font-title"
                  >
                    여정 출발하기 🚀
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* --- Premium Toast Notification --- */}
          {showToast && (
            <div className="fixed bottom-20 left-1/2 -translate-x-1/2 bg-[#E88B88] text-white text-[11px] font-semibold py-2.5 px-5 rounded-xl shadow-lg z-50 text-center max-w-xs animate-bounce border border-rose-300 font-title">
              🌸 {showToast}
            </div>
          )}

        </div>
      );
    }

    // React DOM Rendering to HTML
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
